# Server Configuration
server.port=8081
server.servlet.context-path=/airtel-inventory

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/airtel_inventory}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT:org.hibernate.dialect.MySQLDialect}

# Thymeleaf Configuration
spring.thymeleaf.cache=false
